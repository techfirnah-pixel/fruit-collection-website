<head>

    <link rel="stylesheet" href="styles.css">
    <title>Contact Us</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="#">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">

        <button type="submit">Send</button>
    </form>
